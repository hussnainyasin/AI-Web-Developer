
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    
    /* Updated Background: Mixture of Dodger Blue and Sky Blue only */
    background: linear-gradient(270deg, #1e90ff, #87ceeb, #1e90ff);
    
    background-size: 400% 400%;
    animation: moveGradient 8s ease infinite;
    
    color: #0f172a;
    text-align: center;
    overflow: hidden;
}

@keyframes moveGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Remaining code kept exactly the same */
.card{
background: rgba(255,255,255,0.2);
padding:40px;
border-radius:20px;
backdrop-filter:blur(12px);
border: 1px solid rgba(255,255,255,0.3);
box-shadow: 0 10px 30px rgba(0,0,0,0.3);
max-width: 320px;
}

.card h1{
font-size:25px;
font-weight:600;
line-height:1.4;
color:#0f172a;
}

button{
margin-top:25px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#0ea5e9;
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s ease;
box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

button:hover{
transform:translateY(-3px);
background:#020617;
}
</style>
</head>
<body>
<div class="card">

<h1>Welcome to AI Web Developer</h1>

<a href="index2.html">
<button>Enter Website</button>
</a>

</div>

</body>
</html>
